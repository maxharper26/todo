<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: #f6f8fa; color: #1f2328; min-height: 100vh; padding: 24px; }

    .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    h1 { font-size: 1.3rem; font-weight: 600; }
    .topbar-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .stat-pill { background: #fff; border: 1px solid #d0d7de; border-radius: 20px;
                 padding: 4px 12px; font-size: 0.78rem; color: #57606a; }
    .stat-pill strong { color: #1f2328; }

    .btn { font-size: 0.82rem; border-radius: 6px; padding: 6px 14px; cursor: pointer;
           border: 1px solid; font-weight: 500; white-space: nowrap; }
    .btn-primary { background: #1f883d; border-color: #1f883d; color: #fff; }
    .btn-primary:hover { background: #1a7f37; }
    .btn-ghost { background: #f6f8fa; border-color: #d0d7de; color: #24292f; }
    .btn-ghost:hover { background: #eef1f4; }

    /* Toggle */
    .filter-toggle { display: flex; border: 1px solid #d0d7de; border-radius: 6px; overflow: hidden; }
    .filter-toggle button { font-size: 0.78rem; padding: 5px 12px; cursor: pointer;
                            border: none; background: #f6f8fa; color: #57606a; font-weight: 500; }
    .filter-toggle button.active { background: #1f2328; color: #fff; }

    .columns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .col { background: #fff; border: 1px solid #d0d7de; border-radius: 10px; overflow: hidden; }
    .col-header { display: flex; align-items: center; gap: 8px; padding: 12px 16px;
                  border-bottom: 1px solid #d0d7de; background: #f6f8fa; }
    .col-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .col-title { font-size: 0.85rem; font-weight: 600; flex: 1; }
    .col-count { font-size: 0.75rem; background: #d0d7de; border-radius: 20px;
                 padding: 1px 8px; color: #57606a; font-weight: 500; }
    .col-body { padding: 8px; min-height: 80px; }
    .col-body.drag-over { background: #eef6ff; border: 2px dashed #0969da; border-radius: 8px; }

    .card { border: 1px solid #d0d7de; border-radius: 8px; padding: 12px 14px;
            margin-bottom: 8px; background: #fff; font-size: 0.85rem; }
    .card[draggable=true] { cursor: grab; }
    .card[draggable=true]:active { cursor: grabbing; opacity: 0.7; }
    .card.overdue { border-color: #cf222e; background: #fff8f8; }

    .card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .urgency-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-right: 5px; }
    .task-id { font-size: 0.72rem; color: #57606a; font-family: monospace; }
    .cat-badge { font-size: 0.9rem; background: none; border: none; }

    .card h3 { font-size: 0.88rem; font-weight: 600; margin-bottom: 4px; line-height: 1.4; }
    .closed-title { text-decoration: line-through; color: #57606a; }
    .desc { font-size: 0.78rem; color: #57606a; margin-bottom: 6px; line-height: 1.5; }

    .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; gap: 8px; }
    .footer-left { display: flex; flex-direction: column; gap: 2px; }
    .date-label { font-size: 0.72rem; color: #57606a; }
    .due-label { font-size: 0.72rem; color: #57606a; }
    .due-label.overdue { color: #cf222e; font-weight: 600; }
    .card-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .close-btn { font-size: 0.72rem; border: 1px solid #d0d7de; border-radius: 4px;
                 padding: 2px 8px; cursor: pointer; background: #f6f8fa; color: #24292f; }
    .close-btn:hover { background: #1f883d; color: #fff; border-color: #1f883d; }
    .delete-btn { font-size: 0.72rem; border: 1px solid #d0d7de; border-radius: 4px;
                  padding: 2px 8px; cursor: pointer; background: #f6f8fa; color: #57606a; }
    .delete-btn:hover { background: #cf222e; color: #fff; border-color: #cf222e; }

    .closed-section { margin-top: 24px; }
    .closed-toggle { display: flex; align-items: center; gap: 8px; cursor: pointer;
                     padding: 8px 4px; user-select: none; color: #57606a; font-size: 0.85rem; font-weight: 600; }
    .closed-toggle:hover { color: #1f2328; }
    .chevron { font-size: 0.65rem; transition: transform 0.2s; }
    .chevron.open { transform: rotate(90deg); }
    #closed-grid { display: none; margin-top: 12px; }
    #closed-grid.open { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4);
                     z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 10px; padding: 24px; width: 480px;
             max-width: 95vw; box-shadow: 0 8px 32px rgba(0,0,0,.18); }
    .modal h2 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 0.82rem; font-weight: 500; margin-bottom: 4px; color: #57606a; }
    input[type=text], input[type=date], textarea, select {
      width: 100%; border: 1px solid #d0d7de; border-radius: 6px;
      padding: 8px 10px; font-size: 0.85rem; font-family: inherit; background: #fff; }
    input:focus, textarea:focus, select:focus {
      outline: none; border-color: #0969da; box-shadow: 0 0 0 3px rgba(9,105,218,.1); }
    textarea { resize: vertical; min-height: 72px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }

    .empty { color: #8c959f; font-size: 0.8rem; text-align: center; padding: 16px 0; }
    .page-footer { margin-top: 20px; font-size: 0.72rem; color: #8c959f; text-align: right; }
  </style>
</head>
<body>

<div class="topbar">
  <h1>📋 Tasks</h1>
  <div class="topbar-right">
    <span class="stat-pill" id="stats">Loading…</span>
    <div class="filter-toggle">
      <button id="btn-all" onclick="setFilter('all')">All</button>
      <button id="btn-work" onclick="setFilter('work')">Work</button>
    </div>
    <button class="btn btn-ghost" onclick="loadTasks()">↻ Refresh</button>
    <button class="btn btn-primary" onclick="openModal()">+ Add task</button>
  </div>
</div>

<div class="columns">
  <div class="col">
    <div class="col-header">
      <div class="col-dot" style="background:#cf222e"></div>
      <span class="col-title">High</span>
      <span class="col-count" id="count-high">0</span>
    </div>
    <div class="col-body" id="list-high"
         ondragover="dragOver(event)" ondrop="drop(event,'high')" ondragleave="dragLeave(event)"></div>
  </div>
  <div class="col">
    <div class="col-header">
      <div class="col-dot" style="background:#bf8700"></div>
      <span class="col-title">Medium</span>
      <span class="col-count" id="count-medium">0</span>
    </div>
    <div class="col-body" id="list-medium"
         ondragover="dragOver(event)" ondrop="drop(event,'medium')" ondragleave="dragLeave(event)"></div>
  </div>
  <div class="col">
    <div class="col-header">
      <div class="col-dot" style="background:#1a7f37"></div>
      <span class="col-title">Low</span>
      <span class="col-count" id="count-low">0</span>
    </div>
    <div class="col-body" id="list-low"
         ondragover="dragOver(event)" ondrop="drop(event,'low')" ondragleave="dragLeave(event)"></div>
  </div>
</div>

<div class="closed-section">
  <div class="closed-toggle" onclick="toggleClosed()">
    <span class="chevron" id="chevron">▶</span>
    <span>Closed</span>
    <span id="closed-count" style="font-size:0.78rem;color:#57606a;margin-left:2px"></span>
  </div>
  <div id="closed-grid">
    <div class="col">
      <div class="col-header">
        <div class="col-dot" style="background:#cf222e;opacity:.4"></div>
        <span class="col-title" style="color:#57606a">High</span>
        <span class="col-count" id="count-closed-high">0</span>
      </div>
      <div class="col-body" id="list-closed-high"></div>
    </div>
    <div class="col">
      <div class="col-header">
        <div class="col-dot" style="background:#bf8700;opacity:.4"></div>
        <span class="col-title" style="color:#57606a">Medium</span>
        <span class="col-count" id="count-closed-medium">0</span>
      </div>
      <div class="col-body" id="list-closed-medium"></div>
    </div>
    <div class="col">
      <div class="col-header">
        <div class="col-dot" style="background:#1a7f37;opacity:.4"></div>
        <span class="col-title" style="color:#57606a">Low</span>
        <span class="col-count" id="count-closed-low">0</span>
      </div>
      <div class="col-body" id="list-closed-low"></div>
    </div>
  </div>
</div>

<p class="page-footer" id="footer"></p>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">
  <div class="modal">
    <h2>New task</h2>
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="input-title" placeholder="Task title" />
    </div>
    <div class="form-group">
      <label>Description <span style="font-weight:400">(optional)</span></label>
      <textarea id="input-desc" placeholder="More detail…"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Urgency</label>
        <select id="input-urgency">
          <option value="high">High</option>
          <option value="medium" selected>Medium</option>
          <option value="low">Low</option>
        </select>
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="input-category">
          <option value="work">💼 Work</option>
          <option value="personal">🏠 Personal</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Due date <span style="font-weight:400">(optional)</span></label>
      <input type="date" id="input-due" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="addTask()">Add task</button>
    </div>
  </div>
</div>

<script>
let allTasks = [];
let draggingId = null;
let activeFilter = 'all';

function uuid() {
  return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
    (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));
}

function today() {
  return new Date().toISOString().slice(0, 10);
}

function isOverdue(due_date) {
  return due_date && due_date < today();
}

async function loadTasks() {
  const res = await fetch('/api/tasks');
  const data = await res.json();
  allTasks = data.tasks || [];
  render();
  document.getElementById('footer').textContent =
    'Last loaded ' + new Date().toLocaleTimeString('en-AU');
}

async function saveTasks() {
  await fetch('/api/tasks', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ tasks: allTasks })
  });
}

function setFilter(f) {
  activeFilter = f;
  document.getElementById('btn-all').classList.toggle('active', f === 'all');
  document.getElementById('btn-work').classList.toggle('active', f === 'work');
  render();
}

function visibleTasks(tasks) {
  if (activeFilter === 'work') return tasks.filter(t => t.category === 'work');
  return tasks;
}

function render() {
  const open = visibleTasks(allTasks.filter(t => t.status === 'open'));
  const closed = visibleTasks(allTasks.filter(t => t.status === 'closed'));

  ['high','medium','low'].forEach(u => {
    const tasks = open.filter(t => t.urgency === u);
    document.getElementById(`list-${u}`).innerHTML =
      tasks.length ? tasks.map(t => card(t, false)).join('') : `<p class="empty">No tasks</p>`;
    document.getElementById(`count-${u}`).textContent = tasks.length;

    const ctasks = closed.filter(t => t.urgency === u);
    document.getElementById(`list-closed-${u}`).innerHTML =
      ctasks.map(t => card(t, true)).join('') || '';
    document.getElementById(`count-closed-${u}`).textContent = ctasks.length;
  });

  const allOpen = allTasks.filter(t => t.status === 'open');
  document.getElementById('stats').innerHTML =
    `<strong>${open.length}</strong> open &nbsp;·&nbsp; ${allOpen.length} total`;
  document.getElementById('closed-count').textContent = `(${closed.length})`;
}

function card(t, closed) {
  const icon = closed
    ? `<span class="issue-icon closed-icon">⦿</span>`
    : `<span class="issue-icon open-icon">⦿</span>`;
  const openedDate = (closed ? t.updated_at : t.created_at).slice(0, 10);
  const desc = t.description ? `<p class="desc">${t.description.replace(/\n/g,'<br>')}</p>` : '';
  const cat = t.category || 'work';
  const catBadge = `<span class="cat-badge">${cat === 'work' ? '💼' : '🏠'}</span>`;
  const overdue = !closed && isOverdue(t.due_date);
  const dueHtml = t.due_date
    ? `<span class="due-label ${overdue ? 'overdue' : ''}">Due ${t.due_date}${overdue ? ' ⚠' : ''}</span>`
    : '';
  const actions = closed
    ? `<button class="close-btn" onclick="reopenTask('${t.id}')">↺ Reopen</button>`
    : `<button class="close-btn" onclick="closeTask('${t.id}')">✓ Close</button>`;
  const drag = closed ? '' : `draggable="true" ondragstart="dragStart(event,'${t.id}')"`;
  return `
    <div class="card ${overdue ? 'overdue' : ''}" ${drag}>
      <div class="card-top">
        <div style="display:flex;align-items:center">
          <span class="urgency-dot" style="background:${{high:'#cf222e',medium:'#bf8700',low:'#1a7f37'}[t.urgency]}"></span>
          <span class="task-id">#${t.id.slice(0,8)}</span>
        </div>
        <div class="card-actions">${actions}</div>
      </div>
      <h3 class="${closed ? 'closed-title' : ''}">${t.title}</h3>
      ${desc}
      <div class="card-footer">
        <div class="footer-left">
          <span class="date-label">${closed ? 'Closed' : 'Opened'} ${openedDate}</span>
          ${dueHtml}
        </div>
        <span class="cat-badge">${cat === 'work' ? '💼' : '🏠'}</span>
      </div>
    </div>`;
}

async function closeTask(id) {
  const t = allTasks.find(t => t.id === id);
  if (!t) return;
  t.status = 'closed'; t.updated_at = new Date().toISOString();
  await saveTasks(); render();
}
async function reopenTask(id) {
  const t = allTasks.find(t => t.id === id);
  if (!t) return;
  t.status = 'open'; t.updated_at = new Date().toISOString();
  await saveTasks(); render();
}
async function deleteTask(id) {
  allTasks = allTasks.filter(t => t.id !== id);
  await saveTasks(); render();
}
async function addTask() {
  const title = document.getElementById('input-title').value.trim();
  if (!title) return;
  const now = new Date().toISOString();
  const due = document.getElementById('input-due').value || null;
  allTasks.push({
    id: uuid(), title,
    description: document.getElementById('input-desc').value.trim(),
    urgency: document.getElementById('input-urgency').value,
    category: document.getElementById('input-category').value,
    status: 'open', due_date: due,
    created_at: now, updated_at: now
  });
  await saveTasks(); render(); closeModal();
}

// Drag and drop
function dragStart(e, id) { draggingId = id; e.dataTransfer.effectAllowed = 'move'; }
function dragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function dragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
async function drop(e, urgency) {
  e.preventDefault(); e.currentTarget.classList.remove('drag-over');
  const t = allTasks.find(t => t.id === draggingId);
  if (!t || t.urgency === urgency) return;
  t.urgency = urgency; t.updated_at = new Date().toISOString();
  await saveTasks(); render();
}

// Modal
function openModal() {
  document.getElementById('input-title').value = '';
  document.getElementById('input-desc').value = '';
  document.getElementById('input-urgency').value = 'medium';
  document.getElementById('input-category').value = 'work';
  document.getElementById('input-due').value = '';
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('input-title').focus(), 50);
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function closeModalOutside(e) { if (e.target === document.getElementById('modal')) closeModal(); }
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter')
    if (document.getElementById('modal').classList.contains('open')) addTask();
});

function toggleClosed() {
  document.getElementById('closed-grid').classList.toggle('open');
  document.getElementById('chevron').classList.toggle('open');
}

setFilter('all');
loadTasks();
</script>
</body>
</html>
